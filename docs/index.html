<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Emissor NFS-e · Maradel</title>
  <meta name="description" content="Solicitação e gestão de NFS-e — Maradel Contábil">

  <!-- PWA: instalável na tela inicial (Android/iOS), abre em tela cheia -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#DB8438">
  <link rel="icon" href="assets/icons/favicon-32.png" sizes="32x32" type="image/png">
  <!-- iOS (Safari): ícone e modo app -->
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NFS-e Maradel">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Splash inicial enquanto o JS carrega -->
    <div class="center-screen"><div class="spinner"></div></div>
  </div>
  <div id="toast"></div>
  <script type="module" src="js/app.js"></script>
  <!-- Registra o service worker (PWA) com atualização automática: quando uma
       nova versão assume o controle, a página recarrega sozinha uma vez. -->
  <script>
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      let recarregando = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (recarregando) return; recarregando = true; location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
          .then((reg) => { reg.update().catch(() => {}); })
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
